; Falaya SFA - PHP Configuration
; Disesuaikan untuk VPS shared (4GB RAM dibagi 3 project)

memory_limit = 256M
max_execution_time = 60
upload_max_filesize = 10M
post_max_size = 12M

; Opcache - wajib untuk performa FrankenPHP mode klasik
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Timezone konsisten dengan APP_TIMEZONE Laravel
date.timezone = Asia/Jakarta

; Error reporting - development (akan disesuaikan saat production)
display_errors = On
error_reporting = E_ALL
log_errors = On
